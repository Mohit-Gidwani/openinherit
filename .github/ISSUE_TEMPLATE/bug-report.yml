name: Bug Report
description: Report a problem with an INHERIT schema, tool, or documentation
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: input
    id: schema
    attributes:
      label: Schema affected
      description: Which schema file(s) are involved?
      placeholder: e.g. v1/person.json, v1/common/money.json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: INHERIT version
      description: Which version of INHERIT are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Create a document with...
        2. Validate against...
        3. See error...
    validations:
      required: false
