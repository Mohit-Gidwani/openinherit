name: Generate Types

on:
  push:
    branches:
      - main
    paths:
      - 'v1/**'
      - 'openapi/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bundle OpenAPI spec
        run: pnpm run bundle

      - name: Generate TypeScript types
        run: pnpm run generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet generated/ openapi/v1/openapi-bundled.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated output
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/ openapi/v1/openapi-bundled.yaml
          git commit -m "chore: regenerate TypeScript types from schema changes"
          git push
