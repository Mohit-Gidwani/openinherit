          format: date
        exportedBy:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            organisationName:
              type: string
          additionalProperties: false
        generator:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            url:
              type: string
          required:
            - name
          additionalProperties: false
        estate:
          $ref: '#/components/schemas/estate'
        people:
          type: array
          items:
            $ref: '#/components/schemas/person'
        kinships:
          type: array
          items:
            $ref: '#/components/schemas/kinship'
        relationships:
          type: array
          items:
            $ref: '#/components/schemas/relationship'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/property'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/asset'
        assetCollections:
          type: array
          items:
            $ref: '#/components/schemas/asset-collection'
        assetInterests:
          type: array
          items:
            $ref: '#/components/schemas/asset-interest'
        liabilities:
          type: array
          items:
            $ref: '#/components/schemas/liability'
        bequests:
          type: array
          items:
            $ref: '#/components/schemas/bequest'
        trusts:
          type: array
          items:
            $ref: '#/components/schemas/trust'
        executors:
          type: array
          items:
            $ref: '#/components/schemas/executor'
        guardians:
          type: array
          items:
            $ref: '#/components/schemas/guardian'
        wishes:
          type: array
          items:
            $ref: '#/components/schemas/wish'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/document'
        nonprobateTransfers:
          type: array
          items:
            $ref: '#/components/schemas/nonprobate-transfer'
        proxyAuthorisations:
          type: array
