            type: object
            properties:
              personId:
                type: string
                format: uuid
              category:
                type: string
                enum:
                  - spouse
                  - former_spouse
                  - child
                  - child_of_family
                  - maintained_person
                  - cohabitant
              notes:
                type: string
            required:
              - personId
              - category
            additionalProperties: false
          $comment: Persons eligible to claim under Inheritance (Provision for Family and Dependants) Act 1975.
        legislativeChanges:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              status:
                type: string
                enum:
                  - enacted
                  - royal_assent
                  - bill_stage
                  - consultation
                  - announced
              effectiveDate:
                type: string
                format: date
              notes:
                type: string
            required:
              - description
